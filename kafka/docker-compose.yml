services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-practice
    ports:
      - "9092:9092"
    environment:
      # KRaft 설정 (Zookeeper 없이 구동)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      
      # 리스너 설정: 내부(29092), 외부/호스트(9092), 컨트롤러(29093) 분리
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      
      # 클러스터 ID (KRaft 필수 설정)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      
      # 연습용 설정 (복제본 1개)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-practice
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      # Kafka-UI에서 연결할 클러스터 설정
      KAFKA_CLUSTERS_0_NAME: local-kafka-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092  # 도커 내부 네트워크망 주소 사용
      DYNAMIC_CONFIG_ENABLED: 'true'

