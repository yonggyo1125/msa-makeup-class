spring:
  application:
    name: order-service
  config:
    import: 'optional:configserver: '
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

eureka:
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_URL1:localhost}:13101/eureka/,http://${EUREKA_URL2:localhost}:13102/eureka/
